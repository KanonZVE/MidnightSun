name: Build AppImage

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-appimage:
    runs-on: ubuntu-22.04
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            ninja-build \
            libdrm-dev \
            libgl-dev \
            libwayland-dev \
            libx11-xcb-dev \
            libxcb-dri3-dev \
            libxfixes-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libfuse2 \
            libcap-dev \
            libcurl4-openssl-dev \
            libevdev-dev \
            libgbm-dev \
            libminiupnpc-dev \
            libnotify-dev \
            libnuma-dev \
            libopus-dev \
            libpipewire-0.3-dev \
            libpulse-dev \
            libssl-dev \
            libsystemd-dev \
            libudev-dev \
            libx11-dev \
            libxcb-shm0-dev \
            libxcb-xfixes0-dev \
            libxcb1-dev \
            libxrandr-dev \
            libxtst-dev \
            libvulkan-dev \
            libva-dev \
            glslang-tools \
            npm \
            python3-jinja2 \
            python3-setuptools

      - name: Configure CMake with AppImage flag
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr \
            -DSUNSHINE_ASSETS_DIR=share/sunshine \
            -DSUNSHINE_EXECUTABLE_PATH=/usr/bin/sunshine \
            -DSUNSHINE_BUILD_APPIMAGE=ON \
            -DSUNSHINE_ENABLE_DRM=ON \
            -DSUNSHINE_ENABLE_PORTAL=ON \
            -DSUNSHINE_ENABLE_WAYLAND=ON \
            -DSUNSHINE_ENABLE_X11=ON

      - name: Build
        run: ninja -C build

      - name: Install to AppDir
        run: |
          cd build
          DESTDIR=AppDir ninja install

      - name: Copy custom AppRun
        run: |
          cp -f packaging/AppImage/AppRun build/AppDir/
          chmod +x build/AppDir/AppRun

      - name: Download linuxdeploy
        run: |
          cd build
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage
          wget -q https://raw.githubusercontent.com/linuxdeploy/linuxdeploy-plugin-gtk/master/linuxdeploy-plugin-gtk.sh
          chmod +x linuxdeploy-plugin-gtk.sh

      - name: Create AppImage
        env:
          DEPLOY_GTK_VERSION: 3
        run: |
          cd build
          ./linuxdeploy-x86_64.AppImage \
            --appdir AppDir \
            --plugin gtk \
            --executable AppDir/usr/bin/sunshine \
            --desktop-file ../packaging/AppImage/com.midnightsun.app.desktop \
            --output appimage

      - name: Rename AppImage
        run: |
          cd build
          find . -name "*.AppImage" -type f -exec mv {} ../MidnightSun-x86_64.AppImage \;
          chmod +x ../MidnightSun-x86_64.AppImage

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: MidnightSun-AppImage
          path: MidnightSun-x86_64.AppImage
          if-no-files-found: error

      - name: Show AppImage info
        run: |
          ls -lh MidnightSun-x86_64.AppImage
          file MidnightSun-x86_64.AppImage
