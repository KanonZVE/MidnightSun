name: Build AppImage

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-appimage:
    runs-on: ubuntu-22.04
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            ninja-build \
            libdrm-dev \
            libgl-dev \
            libwayland-dev \
            libx11-xcb-dev \
            libxcb-dri3-dev \
            libxfixes-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libfuse2 \
            libcap-dev \
            libcurl4-openssl-dev \
            libevdev-dev \
            libgbm-dev \
            libminiupnpc-dev \
            libnotify-dev \
            libnuma-dev \
            libopus-dev \
            libpipewire-0.3-dev \
            libpulse-dev \
            libssl-dev \
            libsystemd-dev \
            libudev-dev \
            libx11-dev \
            libxcb-shm0-dev \
            libxcb-xfixes0-dev \
            libxcb1-dev \
            libxrandr-dev \
            libxtst-dev \
            libvulkan-dev \
            libva-dev \
            glslang-tools \
            npm \
            python3-jinja2 \
            python3-setuptools

      - name: Show system info
        run: |
          echo "=== System Info ==="
          uname -a
          echo "=== CMake Version ==="
          cmake --version | head -1
          echo "=== Ninja Version ==="
          ninja --version
          echo "=== GCC Version ==="
          gcc --version | head -1
          echo "=== Disk Space ==="
          df -h .

      - name: Configure CMake with AppImage flag
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr \
            -DSUNSHINE_ASSETS_DIR=share/sunshine \
            -DSUNSHINE_EXECUTABLE_PATH=/usr/bin/sunshine \
            -DSUNSHINE_BUILD_APPIMAGE=ON \
            -DSUNSHINE_ENABLE_DRM=ON \
            -DSUNSHINE_ENABLE_PORTAL=ON \
            -DSUNSHINE_ENABLE_WAYLAND=ON \
            -DSUNSHINE_ENABLE_X11=ON

      - name: Build
        run: ninja -C build

      - name: Install to AppDir
        run: |
          cd build
          mkdir -p AppDir
          DESTDIR=$(pwd)/AppDir ninja install

      - name: Verify AppDir structure
        run: |
          echo "=== AppDir Contents ==="
          ls -la build/AppDir/
          echo "=== AppDir/usr Contents ==="
          ls -la build/AppDir/usr/ 2>/dev/null || echo "usr/ not found"
          echo "=== AppDir/usr/bin Contents ==="
          ls -la build/AppDir/usr/bin/ 2>/dev/null || echo "usr/bin/ not found"
          echo "=== AppDir/usr/share Contents ==="
          ls -la build/AppDir/usr/share/ 2>/dev/null || echo "usr/share/ not found"

      - name: Copy custom AppRun
        run: |
          cp -f packaging/AppImage/AppRun build/AppDir/
          chmod +x build/AppDir/AppRun
          ls -la build/AppDir/AppRun

      - name: Download linuxdeploy
        run: |
          cd build
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage
          wget -q https://raw.githubusercontent.com/linuxdeploy/linuxdeploy-plugin-gtk/master/linuxdeploy-plugin-gtk.sh
          chmod +x linuxdeploy-plugin-gtk.sh

      - name: Create AppImage
        env:
          DEPLOY_GTK_VERSION: 3
        run: |
          cd build
          ./linuxdeploy-x86_64.AppImage \
            --appdir AppDir \
            --plugin gtk \
            --executable AppDir/usr/bin/sunshine \
            --desktop-file ../packaging/AppImage/com.midnightsun.app.desktop \
            --output appimage

      - name: Rename AppImage
        run: |
          cd build
          find . -name "*.AppImage" -type f -exec mv {} ../MidnightSun-x86_64.AppImage \;
          chmod +x ../MidnightSun-x86_64.AppImage

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: MidnightSun-AppImage
          path: MidnightSun-x86_64.AppImage
          if-no-files-found: warn

      - name: Show AppImage info
        run: |
          if [ -f MidnightSun-x86_64.AppImage ]; then
            echo "=== AppImage Created Successfully ==="
            ls -lh MidnightSun-x86_64.AppImage
            file MidnightSun-x86_64.AppImage
          else
            echo "ERROR: AppImage not found"
            ls -la
          fi

      - name: Show build logs on failure
        if: failure()
        run: |
          echo "=== Build Failed - Diagnostic Info ==="
          echo "=== CMake Cache (relevant) ==="
          grep -E "SUNSHINE|CMAKE_INSTALL_PREFIX|SUNSHINE_ASSETS" build/CMakeCache.txt 2>/dev/null | head -20
          echo "=== Build directory structure ==="
          ls -la build/
          echo "=== AppDir structure ==="
          ls -laR build/AppDir/ 2>/dev/null | head -100
          echo "=== Last 50 lines of build output ==="
          tail -50 build/build.ninja 2>/dev/null || echo "No build.ninja"
