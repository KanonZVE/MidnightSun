name: Build AppImage

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-appimage:
    runs-on: ubuntu-22.04
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            ninja-build \
            libdrm-dev \
            libgl-dev \
            libwayland-dev \
            libx11-xcb-dev \
            libxcb-dri3-dev \
            libxfixes-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libfuse2 \
            libcap-dev \
            libcurl4-openssl-dev \
            libevdev-dev \
            libgbm-dev \
            libminiupnpc-dev \
            libnotify-dev \
            libnuma-dev \
            libopus-dev \
            libpipewire-0.3-dev \
            libpulse-dev \
            libssl-dev \
            libsystemd-dev \
            libudev-dev \
            libx11-dev \
            libxcb-shm0-dev \
            libxcb-xfixes0-dev \
            libxcb1-dev \
            libxrandr-dev \
            libxtst-dev \
            libvulkan-dev \
            libva-dev \
            glslang-tools \
            npm \
            python3-jinja2 \
            python3-setuptools \
            2>&1 | tail -20

      - name: Show system info
        run: |
          echo "=== System Info ==="
          uname -a
          echo "=== CMake Version ==="
          cmake --version
          echo "=== Ninja Version ==="
          ninja --version
          echo "=== GCC Version ==="
          gcc --version | head -1
          echo "=== Disk Space ==="
          df -h

      - name: Configure CMake with AppImage flag
        run: |
          echo "=== CMake Configure ==="
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr \
            -DSUNSHINE_ASSETS_DIR=share/sunshine \
            -DSUNSHINE_EXECUTABLE_PATH=/usr/bin/sunshine \
            -DSUNSHINE_BUILD_APPIMAGE=ON \
            -DSUNSHINE_ENABLE_DRM=ON \
            -DSUNSHINE_ENABLE_PORTAL=ON \
            -DSUNSHINE_ENABLE_WAYLAND=ON \
            -DSUNSHINE_ENABLE_X11=ON \
            -DCMAKE_VERBOSE_MAKEFILE=ON \
            2>&1 | tail -50

      - name: Build
        run: |
          echo "=== Build Start ==="
          ninja -C build 2>&1 | tail -100
          echo "=== Build End ==="

      - name: Install to AppDir
        run: |
          echo "=== Install Start ==="
          cd build
          DESTDIR=AppDir ninja install 2>&1 | tail -50
          echo "=== Install End ==="

      - name: Copy custom AppRun
        run: |
          echo "=== Copy AppRun ==="
          cp -f packaging/AppImage/AppRun build/AppDir/
          chmod +x build/AppDir/AppRun
          ls -la build/AppDir/

      - name: Download linuxdeploy
        run: |
          echo "=== Download linuxdeploy ==="
          cd build
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage
          wget -q https://raw.githubusercontent.com/linuxdeploy/linuxdeploy-plugin-gtk/master/linuxdeploy-plugin-gtk.sh
          chmod +x linuxdeploy-plugin-gtk.sh
          ls -la *.AppImage *.sh

      - name: Create AppImage
        env:
          DEPLOY_GTK_VERSION: 3
        run: |
          echo "=== Create AppImage ==="
          cd build
          ./linuxdeploy-x86_64.AppImage \
            --appdir AppDir \
            --plugin gtk \
            --executable AppDir/usr/bin/sunshine \
            --desktop-file ../packaging/AppImage/com.midnightsun.app.desktop \
            --output appimage \
            2>&1 | tail -100

      - name: Rename AppImage
        run: |
          echo "=== Rename AppImage ==="
          cd build
          find . -name "*.AppImage" -type f
          find . -name "*.AppImage" -type f -exec mv {} ../MidnightSun-x86_64.AppImage \;
          chmod +x ../MidnightSun-x86_64.AppImage

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: MidnightSun-AppImage
          path: MidnightSun-x86_64.AppImage
          if-no-files-found: warn

      - name: Show AppImage info
        run: |
          echo "=== AppImage Info ==="
          if [ -f MidnightSun-x86_64.AppImage ]; then
            ls -lh MidnightSun-x86_64.AppImage
            file MidnightSun-x86_64.AppImage
          else
            echo "AppImage not found"
            ls -la
          fi

      - name: Show build logs on failure
        if: failure()
        run: |
          echo "=== Build Failed - Showing Logs ==="
          echo "=== CMake Cache ==="
          cat build/CMakeCache.txt | grep -E "SUNSHINE|CMAKE" | head -30
          echo "=== CMake Output ==="
          cat build/CMakeFiles/CMakeOutput.log 2>/dev/null || echo "No CMakeOutput.log"
          echo "=== Last 100 lines of build log ==="
          cat build/build.ninja 2>/dev/null | tail -100 || echo "No build.ninja"
          echo "=== AppDir contents ==="
          ls -laR build/AppDir/ 2>/dev/null | head -50
