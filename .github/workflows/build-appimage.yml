name: Build AppImage

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-appimage:
    runs-on: ubuntu-24.04
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Manually clone required submodules
        run: |
          echo "=== Cloning required submodules manually ==="
          
          # Remove empty directories if they exist (but keep wlr-protocols with our XML file)
          rm -rf third-party/glad
          rm -rf third-party/moonlight-common-c
          rm -rf third-party/Simple-Web-Server
          rm -rf third-party/libdisplaydevice
          rm -rf third-party/nanors
          rm -rf third-party/nv-codec-headers
          rm -rf third-party/nvapi
          rm -rf third-party/inputtino
          rm -rf third-party/googletest
          rm -rf third-party/build-deps
          rm -rf third-party/doxyconfig
          rm -rf third-party/wayland-protocols
          # Note: wlr-protocols is NOT deleted - it contains our XML file
          
          # Clone glad
          git clone --depth 1 https://github.com/Dav1dde/glad.git third-party/glad
          
          # Clone moonlight-common-c (recursive to get enet submodule)
          git clone --recursive https://github.com/moonlight-stream/moonlight-common-c.git third-party/moonlight-common-c
          
          # Clone Simple-Web-Server
          git clone --depth 1 https://github.com/LizardByte-infrastructure/Simple-Web-Server.git third-party/Simple-Web-Server
          
          # Clone libdisplaydevice
          git clone --depth 1 https://github.com/LizardByte/libdisplaydevice.git third-party/libdisplaydevice
          
          # Clone nanors
          git clone --depth 1 https://github.com/sleepybishop/nanors.git third-party/nanors
          
          # Clone nv-codec-headers
          git clone --depth 1 -b sdk/12.0 https://github.com/FFmpeg/nv-codec-headers.git third-party/nv-codec-headers
          
          # Clone nvapi
          git clone --depth 1 https://github.com/NVIDIA/nvapi.git third-party/nvapi
          
          # Clone inputtino
          git clone --depth 1 -b stable https://github.com/games-on-whales/inputtino.git third-party/inputtino
          
          # Clone googletest
          git clone --depth 1 https://github.com/google/googletest.git third-party/googletest
          
          # Clone build-deps (recursive to get nested submodules)
          git clone --recursive https://github.com/LizardByte/build-deps.git third-party/build-deps
          
          # Skip doxyconfig - not needed for AppImage (documentation only)
          # git clone --depth 1 https://github.com/LizardByte/doxyconfig.git third-party/doxyconfig
          
          echo "=== Verifying cloned directories ==="
          ls -la third-party/
          echo "=== Checking glad/cmake ==="
          ls -la third-party/glad/cmake/ 2>/dev/null || echo "glad/cmake not found"
          echo "=== Checking moonlight-common-c/enet ==="
          ls -la third-party/moonlight-common-c/enet/ 2>/dev/null || echo "moonlight-common-c/enet not found"

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            ninja-build \
            libdrm-dev \
            libgl-dev \
            libwayland-dev \
            wayland-protocols \
            libx11-xcb-dev \
            libxcb-dri3-dev \
            libxfixes-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libfuse2 \
            libcap-dev \
            libcurl4-openssl-dev \
            libevdev-dev \
            libgbm-dev \
            libminiupnpc-dev \
            libnotify-dev \
            libnuma-dev \
            libopus-dev \
            libpipewire-0.3-dev \
            libpulse-dev \
            libssl-dev \
            libsystemd-dev \
            libudev-dev \
            libx11-dev \
            libxcb-shm0-dev \
            libxcb-xfixes0-dev \
            libxcb1-dev \
            libxrandr-dev \
            libxtst-dev \
            libvulkan-dev \
            libva-dev \
            glslang-tools \
            npm \
            python3-jinja2 \
            python3-setuptools

      - name: Copy wayland-protocols from system
        run: |
          echo "=== Copying wayland-protocols from system ==="
          # Find where wayland-protocols is installed
          WAYLAND_PROTOCOLS_DIR=$(dpkg -L wayland-protocols | grep -E "/stable/|/unstable/" | head -1 | sed 's|/stable/.*||;s|/unstable/.*||')
          echo "=== Base directory: $WAYLAND_PROTOCOLS_DIR ==="
          
          # Copy to third-party
          rm -rf third-party/wayland-protocols
          if [ -n "$WAYLAND_PROTOCOLS_DIR" ]; then
            cp -r "$WAYLAND_PROTOCOLS_DIR" third-party/wayland-protocols
          else
            # Fallback: try common locations
            if [ -d "/usr/share/wayland-protocols" ]; then
              cp -r /usr/share/wayland-protocols third-party/wayland-protocols
            elif [ -d "/usr/local/share/wayland-protocols" ]; then
              cp -r /usr/local/share/wayland-protocols third-party/wayland-protocols
            else
              echo "ERROR: Could not find wayland-protocols directory"
              exit 1
            fi
          fi
          
          # Verify the copy worked
          echo "=== Verifying wayland-protocols structure ==="
          ls -la third-party/wayland-protocols/
          echo "=== Checking for xdg-output-unstable-v1.xml ==="
          find third-party/wayland-protocols -name "xdg-output-unstable-v1.xml" 2>/dev/null || echo "Not found"
          
          # Verify wlr-protocols file exists
          echo "=== Verifying wlr-protocols ==="
          ls -la third-party/wlr-protocols/unstable/ 2>/dev/null || echo "wlr-protocols directory not found"

      - name: Show system info
        run: |
          echo "=== System Info ==="
          uname -a
          echo "=== CMake Version ==="
          cmake --version | head -1
          echo "=== Ninja Version ==="
          ninja --version
          echo "=== GCC Version ==="
          gcc --version | head -1

      - name: Configure CMake with AppImage flag
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr \
            -DSUNSHINE_ASSETS_DIR=share/sunshine \
            -DSUNSHINE_EXECUTABLE_PATH=/usr/bin/sunshine \
            -DSUNSHINE_BUILD_APPIMAGE=ON \
            -DCUDA_FAIL_ON_MISSING=OFF \
            -DBUILD_DOCS=OFF \
            -DBUILD_TESTS=OFF \
            -DSUNSHINE_ENABLE_TRAY=OFF \
            -DSUNSHINE_ENABLE_DRM=ON \
            -DSUNSHINE_ENABLE_PORTAL=ON \
            -DSUNSHINE_ENABLE_WAYLAND=ON \
            -DSUNSHINE_ENABLE_X11=ON

      - name: Build
        run: ninja -C build

      - name: Install to AppDir
        run: |
          cd build
          mkdir -p AppDir
          DESTDIR=$(pwd)/AppDir ninja install

      - name: Copy custom AppRun
        run: |
          cp -f packaging/linux/AppImage/AppRun build/AppDir/
          chmod +x build/AppDir/AppRun

      - name: Download linuxdeploy
        run: |
          cd build
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage
          wget -q https://raw.githubusercontent.com/linuxdeploy/linuxdeploy-plugin-gtk/master/linuxdeploy-plugin-gtk.sh
          chmod +x linuxdeploy-plugin-gtk.sh

      - name: Create AppImage
        env:
          DEPLOY_GTK_VERSION: 3
        run: |
          cd build
          ./linuxdeploy-x86_64.AppImage \
            --appdir AppDir \
            --plugin gtk \
            --executable AppDir/usr/bin/sunshine \
            --desktop-file ../packaging/linux/AppImage/com.midnightsun.app.desktop \
            --output appimage

      - name: Rename AppImage
        run: |
          cd build
          find . -name "*.AppImage" -type f -exec mv {} ../MidnightSun-x86_64.AppImage \;
          chmod +x ../MidnightSun-x86_64.AppImage

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: MidnightSun-AppImage
          path: MidnightSun-x86_64.AppImage
          if-no-files-found: warn

      - name: Show AppImage info
        run: |
          if [ -f MidnightSun-x86_64.AppImage ]; then
            echo "=== AppImage Created Successfully ==="
            ls -lh MidnightSun-x86_64.AppImage
            file MidnightSun-x86_64.AppImage
          else
            echo "ERROR: AppImage not found"
            ls -la
          fi

      - name: Show build logs on failure
        if: failure()
        run: |
          echo "=== Build Failed - Diagnostic Info ==="
          echo "=== Third-party directories ==="
          ls -la third-party/ 2>/dev/null
          echo "=== Glad directory contents ==="
          ls -la third-party/glad/ 2>/dev/null || echo "glad not found"
          echo "=== CMake Error Log ==="
          cat build/CMakeFiles/CMakeOutput.log 2>/dev/null | tail -50 || echo "No CMakeOutput.log"
