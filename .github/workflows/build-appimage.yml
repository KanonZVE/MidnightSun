name: Build AppImage

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-appimage:
    runs-on: ubuntu-22.04
    
    steps:
      - name: Checkout code with submodules
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Initialize all submodules
        run: |
          echo "=== Configuring git for submodules ==="
          git config --global submodule.recurse true
          git config --global protocol.version 2
          
          echo "=== Initializing submodules ==="
          git submodule sync --recursive
          git submodule update --init --recursive --force --checkout
          
          echo "=== Submodule status ==="
          git submodule status --recursive
          
          echo "=== Checking third-party directories ==="
          ls -la third-party/
          echo "=== Checking glad directory ==="
          ls -la third-party/glad/ 2>/dev/null || echo "glad directory empty or missing"
          echo "=== Checking moonlight-common-c directory ==="
          ls -la third-party/moonlight-common-c/ 2>/dev/null || echo "moonlight-common-c directory empty or missing"

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            ninja-build \
            libdrm-dev \
            libgl-dev \
            libwayland-dev \
            libx11-xcb-dev \
            libxcb-dri3-dev \
            libxfixes-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libfuse2 \
            libcap-dev \
            libcurl4-openssl-dev \
            libevdev-dev \
            libgbm-dev \
            libminiupnpc-dev \
            libnotify-dev \
            libnuma-dev \
            libopus-dev \
            libpipewire-0.3-dev \
            libpulse-dev \
            libssl-dev \
            libsystemd-dev \
            libudev-dev \
            libx11-dev \
            libxcb-shm0-dev \
            libxcb-xfixes0-dev \
            libxcb1-dev \
            libxrandr-dev \
            libxtst-dev \
            libvulkan-dev \
            libva-dev \
            glslang-tools \
            npm \
            python3-jinja2 \
            python3-setuptools

      - name: Show system info
        run: |
          echo "=== System Info ==="
          uname -a
          echo "=== CMake Version ==="
          cmake --version | head -1
          echo "=== Ninja Version ==="
          ninja --version
          echo "=== GCC Version ==="
          gcc --version | head -1

      - name: Configure CMake with AppImage flag
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr \
            -DSUNSHINE_ASSETS_DIR=share/sunshine \
            -DSUNSHINE_EXECUTABLE_PATH=/usr/bin/sunshine \
            -DSUNSHINE_BUILD_APPIMAGE=ON \
            -DSUNSHINE_ENABLE_DRM=ON \
            -DSUNSHINE_ENABLE_PORTAL=ON \
            -DSUNSHINE_ENABLE_WAYLAND=ON \
            -DSUNSHINE_ENABLE_X11=ON

      - name: Build
        run: ninja -C build

      - name: Install to AppDir
        run: |
          cd build
          mkdir -p AppDir
          DESTDIR=$(pwd)/AppDir ninja install

      - name: Copy custom AppRun
        run: |
          cp -f packaging/linux/AppImage/AppRun build/AppDir/
          chmod +x build/AppDir/AppRun

      - name: Download linuxdeploy
        run: |
          cd build
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage
          wget -q https://raw.githubusercontent.com/linuxdeploy/linuxdeploy-plugin-gtk/master/linuxdeploy-plugin-gtk.sh
          chmod +x linuxdeploy-plugin-gtk.sh

      - name: Create AppImage
        env:
          DEPLOY_GTK_VERSION: 3
        run: |
          cd build
          ./linuxdeploy-x86_64.AppImage \
            --appdir AppDir \
            --plugin gtk \
            --executable AppDir/usr/bin/sunshine \
            --desktop-file ../packaging/linux/AppImage/com.midnightsun.app.desktop \
            --output appimage

      - name: Rename AppImage
        run: |
          cd build
          find . -name "*.AppImage" -type f -exec mv {} ../MidnightSun-x86_64.AppImage \;
          chmod +x ../MidnightSun-x86_64.AppImage

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: MidnightSun-AppImage
          path: MidnightSun-x86_64.AppImage
          if-no-files-found: warn

      - name: Show AppImage info
        run: |
          if [ -f MidnightSun-x86_64.AppImage ]; then
            echo "=== AppImage Created Successfully ==="
            ls -lh MidnightSun-x86_64.AppImage
            file MidnightSun-x86_64.AppImage
          else
            echo "ERROR: AppImage not found"
            ls -la
          fi

      - name: Show build logs on failure
        if: failure()
        run: |
          echo "=== Build Failed - Diagnostic Info ==="
          echo "=== Git Submodule Status ==="
          git submodule status --recursive 2>&1
          echo "=== Git Remote -v ==="
          git remote -v
          echo "=== .gitmodules content ==="
          cat .gitmodules 2>/dev/null || echo ".gitmodules not found"
          echo "=== Third-party directories ==="
          ls -la third-party/ 2>/dev/null || echo "third-party not found"
          echo "=== CMake Error Log ==="
          cat build/CMakeFiles/CMakeOutput.log 2>/dev/null | tail -50 || echo "No CMakeOutput.log"
