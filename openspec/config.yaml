# openspec/config.yaml - SDD Configuration for MidnightSun
schema: spec-driven

context: |
  Tech stack: C++ 17+, CMake 3.20+, VAAPI (AMD GPU), KMS/DRM, Wayland
  Architecture: Platform-specific backends (linux/windows/macos), capture+encode pipeline
  Testing: CMake test infrastructure, catch2
  Style: clang-format, cppcheck, clang-tidy
  Project: MidnightSun - Linux-focused fork of Sunshine for headless game streaming

strict_tdd: false  # C++ hardware testing (KMS/DRM) requires real hardware, not mockable

rules:
  proposal:
    - Include rollback plan for risky changes
    - Identify affected modules/packages
    - Document architecture decisions with rationale
  specs:
    - Use Given/When/Then format for scenarios
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
  design:
    - Include sequence diagrams for complex flows
    - Document architecture decisions with rationale
  tasks:
    - Group tasks by phase (infrastructure, implementation, testing)
    - Use hierarchical numbering (1.1, 1.2, etc.)
    - Keep tasks small enough to complete in one session
  apply:
    - Follow existing code patterns and conventions
    - Match coding style of surrounding code
  verify:
    - Run tests if test infrastructure exists
    - Compare implementation against every spec scenario
  archive:
    - Warn before merging destructive deltas (large removals)

testing:
  # C++ with CMake - hardware-dependent testing (KMS/DRM)
  runner: cmake_test
  layers:
    unit: false  # KMS/DRM capture cannot be unit tested without hardware
    integration: false
    e2e: false  # Requires actual GPU + display connection
  coverage: not_available
  linter:
    command: clang-tidy
    available: true
  formatter:
    command: clang-format
    available: true
